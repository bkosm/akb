name: Release
on:
  push:
    tags:
      - 'go/akb/v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create plain semver tag for GoReleaser
        run: |
          VERSION=${GITHUB_REF_NAME#go/akb/}
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "$VERSION"
          echo "GORELEASER_CURRENT_TAG=$VERSION" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/akb/go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.GORELEASER_CURRENT_TAG }}
