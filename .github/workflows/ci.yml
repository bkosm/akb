name: CI
on:
  push:
    branches: ['**']
    paths:
      - 'go/akb/**'
      - '.golangci.yml'
      - 'Makefile'
      - '.goreleaser.yml'
  pull_request:
    paths:
      - 'go/akb/**'
      - '.golangci.yml'
      - 'Makefile'
      - '.goreleaser.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/akb/go.mod
      - run: make vet
      - run: make test
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/akb/go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: go/akb
          args: --config ../../.golangci.yml
          version: v2.11.4
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/akb/go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check
